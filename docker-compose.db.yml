services:
  postgres:
    image: postgres:17
    container_name: sbp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sbp
    ports:
      - "5432:5432"
    volumes:
      - sbp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sbp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sbp-postgres-data: